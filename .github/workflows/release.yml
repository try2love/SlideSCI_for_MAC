name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: bash scripts/package-release.sh "${GITHUB_REF_NAME}" "https://127.0.0.1:18443"
      - uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release/release-notes-${{ github.ref_name }}.md
          files: |
            dist/release/*.zip
            dist/release/*.sha256
